substitutions:
  _REGION: europe-west1
  _SERVICE: ashley-os-landing
  _OPENAI_SECRET: OPENAI_API_KEY

steps:
  - name: gcr.io/cloud-builders/docker
    args:
      - build
      - -t
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/ashley-os/${_SERVICE}:latest
      - .

  - name: gcr.io/cloud-builders/docker
    args:
      - push
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/ashley-os/${_SERVICE}:latest

  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      - run
      - deploy
      - ${_SERVICE}
      - --image
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/ashley-os/${_SERVICE}:latest
      - --region
      - ${_REGION}
      - --platform
      - managed
      - --allow-unauthenticated
      - --set-env-vars
      - NODE_ENV=production,BOARD_STORAGE_MODE=memory
      - --set-secrets
      - OPENAI_API_KEY=${_OPENAI_SECRET}:latest,SOVEREIGN_OS_PIN=SOVEREIGN_OS_PIN:latest,JOBSCOUT_API_URL=JOBSCOUT_API_URL:latest,JOBSCOUT_API_KEY=JOBSCOUT_API_KEY:latest,JOBSCOUT_WEB_PASSWORD=JOBSCOUT_WEB_PASSWORD:latest,CAREER_ASSISTANT_API_URL=CAREER_ASSISTANT_API_URL:latest,CAREER_ASSISTANT_API_KEY=CAREER_ASSISTANT_API_KEY:latest

images:
  - ${_REGION}-docker.pkg.dev/$PROJECT_ID/ashley-os/${_SERVICE}:latest
